name: Backend CI

on:
  pull_request:
    paths:
      - "src/app/api/**"
      - "src/lib/**"
      - "src/services/**"
      - "docs/openapi.yaml"
      - "scripts/check-api-contracts.mjs"
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - "bun.lock"
      - "next.config.mjs"
      - "eslint.config.mjs"
      - "jsconfig.json"
      - ".github/workflows/backend.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "src/app/api/**"
      - "src/lib/**"
      - "src/services/**"
      - "docs/openapi.yaml"
      - "scripts/check-api-contracts.mjs"
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - "bun.lock"
      - "next.config.mjs"
      - "eslint.config.mjs"
      - "jsconfig.json"
      - ".github/workflows/backend.yml"

jobs:
  backend:
    name: Lint And Build Backend
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: mongodb://localhost:27017/eduvault-ci
      MONGODB_DB: eduvault-ci
      JWT_SECRET: ci-jwt-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_GATEWAY_URL: https://gateway.pinata.cloud
      PINATA_JWT: ci-pinata-token
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-walletconnect-project-id
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Check API contracts
        run: |
          git show "origin/${{ github.base_ref || github.event.repository.default_branch }}:docs/openapi.yaml" > "$RUNNER_TEMP/openapi-base.yaml"
          npm run check:api-contracts
        env:
          API_CONTRACT_BASE_FILE: ${{ runner.temp }}/openapi-base.yaml
      - name: Lint backend
        run: npm run lint --if-present -- src/app/api src/lib

      - name: Run tests
        run: npm test --if-present

      - name: Run backend telemetry contract tests
        run: npm run test:backend --if-present

      - name: Build application
        run: npm run build --if-present
